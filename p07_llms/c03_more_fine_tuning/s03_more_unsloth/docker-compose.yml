services:
  unsloth:
    image: unsloth/unsloth:latest
    container_name: gzh_unsloth
    ports:
      - 07012:8888  # JupyterLab
      - 07013:22  # SSH
    environment:
      - JUPYTER_PASSWORD=pass
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    volumes:
      - .:/workspace/work
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: no
